# 📘 MediManage: The Complete Monolithic Reference
> **Version**: 17.0 (The Platinum Edition)

# Part I: Vision & Architecture

## 1. The Core Concept & Business Analysis
**"The Why & The What"**

### 1.1 The Business Problem
Pharmacies operating explicitly on manual or legacy systems face three critical issues:
1.  **Inventory Blindness**: Owners don't know *exactly* what is on the shelf versus what is in the books. Expired medicines result in direct financial loss.
2.  **Billing Latency**: Handwriting bills or using slow web-apps creates queues during peak hours.
3.  **Financial Opacity**: "Udhar" (Credit) is tracked in notebooks, leading to lost revenue. Profitability is a guess, not a metric.

### 1.2 The Solution: MediManage
**MediManage** is an **Offline-First Desktop Application** tailored for high-volume retailers.

**Key Value Propositions**:
*   **Zero Latency**: No internet required. Billing happens instantly.
*   **Smart Inventory**: Auto-alerts for expiring medicines 30 days in advance.
*   **AI-Powered Insights**: An integrated "Brain" that can answer medical questions and analyze sales trends locally.
*   **Data Ownership**: 100% of data stays on the shop's machine (Privacy First).

### 1.3 Success Metrics (KPIs)
The project is successful if:
1.  **Billing Time**: < 10 seconds per customer.
2.  **Inventory Accuracy**: 100% match between digital and physical stock.
3.  **Zero Downtime**: App works 24/7 without internet.

### 1.4 User Roles & Access Control
| Role | Responsibilities | Access Level |
| :--- | :--- | :--- |
| **Administrator** (Owner) | Full Control. Viewing Financial Reports (P&L), Managing Users, Editing Stock. | **Read/Write/Delete** |
| **Pharmacist** (Manager) | Managing Inventory (Stock In), Handling Returns, Viewing Expiry Alerts. | **Read/Write** (No delete) |
| **Cashier** (Counter Staff) | POS Only. Scanning barcodes, collecting payments. Cannot see profits or delete stock. | **Read/Write** (POS only) |

## 2. Technology Stack & Technical Architecture
**"The Foundation of the Skyscraper"**

### 2.1 The Core: Java 21 (LTS)
We chose **Java 21** over Python or JS for the core logic because:
*   **Strong Typing**: Prevents "undefined is not a function" errors at runtime.
*   **Concurrency**: Java's virtual threads (Project Loom) allow background tasks without freezing the UI.
*   **Maintainability**: Java code written today will run 10 years from now.

### 2.2 The Presentation Layer: JavaFX + AtlantaFX
*   **Memory Footprint**: JavaFX uses <150MB for the whole app.
*   **Hardware Access**: Direct, low-level access to USB Thermal Printers and Barcode Scanners.
*   **AtlantaFX**: Uses the **Primer Light** theme (GitHub's design system) for a modern look.

### 2.3 The Database: SQLite
*   **Serverless**: The client doesn't need to install MySQL. The database is a single file (`medimanage.db`).
*   **WAL Mode**: **Write-Ahead Logging** allows simultaneous users without UI lags.

### 2.4 The Intelligence: Python Sidecar
Since Java lacks first-class support for modern LLMs, we use a **Polyglot Architecture**.
*   **Stack**: Flask (Server) + ONNX Runtime (Inference) + Hugging Face Hub (Model Management).
*   **Role**: Acts as a local microservice listening on Port 5000.

# Part II: Core Implementation

## 4. Application Lifecycle
**"The Heartbeat"**

### 4.1 The Entry Point: `Launcher.java`
**Responsibility**: The Bootstrap.
JavaFX applications packaged as JARs sometimes fail if the main class extends `Application` due to JPMS rules. This class essentially says "Hey Java, ignore the module system for a second and just launch `MediManageApplication`."

### 4.2 Lifecycle Management (`MediManageApplication.java`)
**Responsibility**: The Main Engine.
1.  **Starts JavaFX**: Loads `login-view.fxml`.
2.  **Lifecycle Management**: It has a `stop()` method that kills the Python AI server when you close the window.
3.  **Global Exception Handling**: catches crashes and logs them.

**Startup Sequence**:
1.  **UI Thread**: Loads Fonts, Applies Theme, Shows Login.
2.  **Background**: Connects to DB, Spawns Python Process (`ProcessBuilder`).

**Shutdown Strategy**:
Uses a **Double-Tap Strategy** to kill the Python sidecar:
1.  **Polite**: Sends `POST /shutdown` to Flask.
2.  **Force**: Calls `process.destroyForcibly()`.

## 6. Database & DAO Pattern
**"The Digital Vault"**

### 6.1 The Database: SQLite
A serverless, single-file database (`medimanage.db`).
*   **Zero Configuration**: The app creates the file automatically if it's missing.

### 6.2 Entity Relationship Diagram (ERD)
```mermaid
erDiagram
    MEDICINES ||--o{ STOCK : has
    BILLS ||--|{ BILL_ITEMS : contains
    MEDICINES ||--|{ BILL_ITEMS : listed_in
    CUSTOMERS ||--o{ BILLS : purchases
```

### 6.3 Data Access Objects (DAO)
**Concept**: "Data Access Objects". **ONLY** these classes are allowed to talk to the SQL Database.
| Component | Key Methods | Legacy |
| :--- | :--- | :--- |
| **`MedicineDAO.java`** | `addMedicine()`, `searchMedicines()`, `checkLowStock()` | Manages inventory. |
| **`BillDAO.java`** | `createBill()`, `getDailySales()` | Handles "Checkout". |
| **`CustomerDAO.java`** | `updateBalance()` | Updates credit balance. |
| **`UserDAO.java`** | `authenticate()` | Checks login credentials. |

### 6.4 Atomic Transactions
Critical operations (like Billing) use ACID transactions:
```java
conn.setAutoCommit(false);
try {
    billDAO.createBill();
    stockDAO.reduceStock();
    conn.commit();
} catch (Exception e) {
    conn.rollback();
}
```

# Part III: Advanced Features & Roadmap

## 13. Cloud Synchronization (Proposed)
**"Offline First, Sync Later"**

### 13.1 Architecture
*   **Local First**: UI never blocks for network.
*   **Background Sync**: Java `ScheduledExecutor` runs every 5 mins.
*   **CDC**: Database uses `last_updated` and `sync_status` flags to track changes.

### 13.2 SQL Schema Update
```sql
ALTER TABLE bills ADD COLUMN last_updated TEXT DEFAULT CURRENT_TIMESTAMP;
ALTER TABLE bills ADD COLUMN sync_status INTEGER DEFAULT 0; -- 0=Pending, 1=Synced
```

### 13.3 Sync Logic
**The Push (Local -> Cloud)**:
1.  Query `SELECT * FROM bills WHERE sync_status = 0`.
2.  Convert to JSON.
3.  Send batch POST to Cloud API.

**The Pull (Cloud -> Local)**:
1.  Query Cloud for `bills` where `updated_at > last_local_sync_time`.
2.  Upsert (Update or Insert) changes into SQLite.

### 13.4 Tech Choice: Firebase
Selected for its robust Offline SDK and easy JSON synchronization.

**"Speed & Safety"**

2.  **If Fail**: **Try Cloud AI** (Google Gemini API).

*   **UI Virtualization**: `TableView` only renders visible rows (handles 10k+ items smoothly).

# Glossary
> *Defining the technical jargon used throughout this document.*

*   **ACID**: Atomicity, Consistency, Isolation, Durability. Properties of database transactions that guarantee validity.
*   **CDC**: Change Data Capture. A pattern to identify and synchronize only the data that has changed.
*   **DAO**: Data Access Object. A design pattern that provides an abstract interface to some type of database or other persistence mechanism.
*   **FCM**: Firebase Cloud Messaging. A cross-platform messaging solution for mobile notifications.
*   **IPC**: Inter-Process Communication. How the Java process talks to the Python process (via HTTP in this project).
*   **JPMS**: Java Platform Module System. The module system introduced in Java 9 that affects how we package dependencies.
*   **LTS**: Long Term Support. A version of software (like Java 21) that is supported for many years.
*   **RAG**: Retrieval-Augmented Generation. A technique to enhance LLM responses by providing relevant context from a local database.
*   **WAL**: Write-Ahead Logging. A method for ensuring data integrity and allowing concurrent reads/writes in SQLite.
