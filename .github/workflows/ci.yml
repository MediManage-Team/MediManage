name: CI

env:
  APP_VERSION: 7.0.0

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: whatsapp-server/package-lock.json

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Install WhatsApp bridge dependencies
        run: npm ci
        working-directory: whatsapp-server

      - name: Run WhatsApp bridge tests
        run: npm test
        working-directory: whatsapp-server

      - name: Run AI Engine contract tests
        run: pytest ai_engine/tests

      - name: Build and test
        run: .\mvnw.cmd -B -ntp clean test

